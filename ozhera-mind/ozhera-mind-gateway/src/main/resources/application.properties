# Server
spring.application.name=@spring.application.name@
server.port=@server.port@

# Nacos
nacos.config.address=@nacos.config.address@

# MyBatis-Flex
mybatis-flex.mapper-locations=classpath*:mapper/*.xml

# Mind Worker (Nacos service name)
mind.worker.service.name=@mind.worker.service.name@

# TPC Auth
inner.auth=@inner.auth@
dev.mode=@dev.mode@

# Driver class name (from properties, others from Nacos)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
