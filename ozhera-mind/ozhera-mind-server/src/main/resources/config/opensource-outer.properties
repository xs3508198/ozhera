# ==================== Server Configuration ====================
app.name=ozhera-mind-server
spring.application.name=ozhera-mind-server
server.type=staging
server.port=8088

log.path=/tmp/work/log

nacos.address=nacos.test.b2c.srv:80
dubbo.group=dev
dubbo.protocol.port=-1
dubbo.registry.address=nacos://nacos.test.b2c.srv:80
nacos.config.address=nacos.test.b2c.srv:80

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

inner.auth=true
dev.mode=false
